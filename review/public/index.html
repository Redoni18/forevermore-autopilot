<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Autopilot</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div id="app">
  <!-- top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="nav-toggle-bars" aria-hidden="true"></span>
      </button>
      <span class="brand">Autopilot</span>
      <span class="brand-sub" id="hd-store"></span>
    </div>
    <div class="topbar-right">
      <span class="kill" id="hd-kill" hidden>
        <span class="kill-dot" aria-hidden="true"></span>
        <span class="kill-label" id="hd-kill-label"></span>
      </span>
      <button type="button" class="btn btn-ghost btn-icon" id="hd-help" aria-label="Keyboard shortcuts" title="Keyboard shortcuts (?)">?</button>
      <button type="button" class="btn btn-ghost" id="hd-refresh" aria-label="Refresh">
        <span class="refresh-glyph" aria-hidden="true"></span>
        Refresh
      </button>
    </div>
  </header>

  <div class="shell">
    <!-- sidebar -->
    <nav class="sidebar" id="sidebar" aria-label="Views">
      <button type="button" class="nav-item is-active" data-view="review" aria-current="page">
        <span class="nav-label">Review</span>
        <span class="nav-badge" id="nav-review-badge" hidden>0</span>
      </button>
      <button type="button" class="nav-item" data-view="planned">
        <span class="nav-label">Planned</span>
      </button>
      <button type="button" class="nav-item" data-view="history">
        <span class="nav-label">History</span>
      </button>
      <div class="nav-sep" aria-hidden="true"></div>
      <button type="button" class="nav-item" data-view="playbook">
        <span class="nav-label">Playbook</span>
        <span class="nav-badge nav-badge-soft" id="nav-playbook-badge" hidden>0</span>
      </button>
      <button type="button" class="nav-item" data-view="activity">
        <span class="nav-label">Activity</span>
      </button>
    </nav>
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <!-- main -->
    <main class="main" id="main" aria-live="polite">
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- toast stack (top-right) -->
  <div class="toast-stack" id="toast-stack" aria-live="assertive" aria-atomic="true"></div>

  <!-- shortcuts cheat sheet -->
  <div class="cheatsheet" id="cheatsheet" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts" hidden>
    <div class="cheatsheet-card">
      <div class="cheatsheet-head">
        <h2>Keyboard shortcuts</h2>
        <button type="button" class="btn btn-ghost btn-icon" id="cheatsheet-close" aria-label="Close">✕</button>
      </div>
      <dl class="cheatsheet-grid">
        <div><dt><kbd>j</kbd> <kbd>k</kbd></dt><dd>Next / previous item</dd></div>
        <div><dt><kbd>a</kbd></dt><dd>Approve</dd></div>
        <div><dt><kbd>e</kbd></dt><dd>Edit caption</dd></div>
        <div><dt><kbd>c</kbd></dt><dd>Request changes</dd></div>
        <div><dt><kbd>r</kbd></dt><dd>Reject</dd></div>
        <div><dt><kbd>&larr;</kbd> <kbd>&rarr;</kbd></dt><dd>Carousel slides</dd></div>
        <div><dt><kbd>esc</kbd></dt><dd>Cancel / close</dd></div>
        <div><dt><kbd>?</kbd></dt><dd>Toggle this sheet</dd></div>
      </dl>
    </div>
  </div>
</div>
<script src="/app.js" type="module"></script>
</body>
</html>

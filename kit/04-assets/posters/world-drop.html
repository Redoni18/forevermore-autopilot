<!doctype html>
<!-- world-drop: params {world (slug), name, tier, line}. A polaroid of the
     world's poster art with its name chip and tier tag.
     RECONSTRUCTED 2026-07-13 — owner review pending. -->
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="poster.css" />
<style>
  .kicker { position: absolute; top: 6.5%; width: 100%; text-align: center; z-index: 2; }
  .kicker .chip { font-size: 42px; padding: 16px 38px; box-shadow: 7px 8px 0 var(--ink); }
  .frame { position: absolute; top: 16%; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 58%; height: 56%; }
  .frame .card { width: 100%; height: 100%; }
  .tier { position: absolute; top: -20px; left: -26px; z-index: 2; }
  .tier .chip { font-size: 28px; padding: 10px 24px; box-shadow: 5px 6px 0 var(--ink); transform: rotate(-6deg); }
  .line { position: absolute; top: 77%; left: 110px; right: 110px; text-align: center; font-size: 54px; font-weight: 500; line-height: 1.25; letter-spacing: -0.01em; }
  .coin.star { top: 10%; right: 9%; width: 92px; height: 92px; transform: rotate(10deg); }
  .coin.heart { bottom: 6%; left: 8%; width: 72px; height: 72px; transform: rotate(-8deg); }
  .url { position: absolute; bottom: 4.5%; width: 100%; text-align: center; font-size: 40px; font-weight: 700; }
</style>
</head>
<body>
  <div class="kicker"><span class="chip name"></span></div>
  <div class="frame">
    <div class="tier"><span class="chip pink"></span></div>
    <div class="card"><img class="art" alt="" /></div>
  </div>
  <div class="line"></div>
  <div class="coin star"></div>
  <div class="coin heart"></div>
  <div class="url">getforevermore.co</div>
  <script type="module">
    import { initPoster, COIN_SVG } from './poster.js';
    initPoster((p) => {
      document.querySelector('.coin.star').innerHTML = COIN_SVG.star;
      document.querySelector('.coin.heart').innerHTML = COIN_SVG.heart;
      document.querySelector('.chip.name').textContent = (p.name || p.world || '').toLowerCase();
      document.querySelector('.chip.pink').textContent = p.tier === 'premium' ? 'premium' : 'standard';
      document.querySelector('.art').src = `assets/thumbs/${p.world}.webp`;
      document.querySelector('.line').textContent = p.line || '';
    });
  </script>
</body>
</html>
